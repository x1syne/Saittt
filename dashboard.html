<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - SoundMate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Стили из главной страницы + дополнительные */
        .user-profile {
            padding: 120px 40px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
        }

        .profile-info h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--light-gray);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .music-taste {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .taste-card {
            background: var(--light-gray);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <!-- Навигация как в главной -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">Sound<span>Mate</span></a>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="studio.html">AI Студия</a>
            <a href="community.html">Сообщество</a>
            <a href="dashboard.html" class="active">Мой профиль</a>
        </div>
        <button class="nav-cta" onclick="logout()">Выйти</button>
    </nav>

    <div class="user-profile">
        <div class="profile-header">
            <img id="userAvatar" class="profile-avatar" src="https://via.placeholder.com/120" alt="Аватар">
            <div class="profile-info">
                <h1 id="userName">Загрузка...</h1>
                <p id="userEmail" style="color: #ccc;">Загрузка...</p>
            </div>
        </div>

        <div class="profile-stats">
            <div class="stat-card">
                <div class="stat-number" id="topArtistsCount">0</div>
                <div class="stat-label">Любимых артистов</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="topTracksCount">0</div>
                <div class="stat-label">Любимых треков</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="playlistsCount">0</div>
                <div class="stat-label">Плейлистов</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="matchScore">0%</div>
                <div class="stat-label">Совместимость</div>
            </div>
        </div>

        <div class="music-taste">
            <div class="taste-card">
                <h3>Топ артистов</h3>
                <ul id="topArtistsList"></ul>
            </div>
            <div class="taste-card">
                <h3>Топ треков</h3>
                <ul id="topTracksList"></ul>
            </div>
        </div>
    </div>

    <script>
        // Получаем токен из URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            window.location.href = 'index.html';
        }

        // Сохраняем токен в localStorage
        localStorage.setItem('spotify_token', token);

        // Загружаем данные пользователя
        async function loadUserData() {
            try {
                const response = await fetch('http://localhost:3000/api/user/music-data', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to load data');

                const data = await response.json();
                displayUserData(data);

            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка загрузки данных');
            }
        }

        function displayUserData(data) {
            // Обновляем счетчики
            document.getElementById('topArtistsCount').textContent = data.topArtists.length;
            document.getElementById('topTracksCount').textContent = data.topTracks.length;
            document.getElementById('playlistsCount').textContent = data.playlists.length;

            // Показываем топ артистов
            const artistsList = document.getElementById('topArtistsList');
            data.topArtists.slice(0, 5).forEach(artist => {
                artistsList.innerHTML += `<li>${artist.name}</li>`;
            });

            // Показываем топ треков
            const tracksList = document.getElementById('topTracksList');
            data.topTracks.slice(0, 5).forEach(track => {
                tracksList.innerHTML += `<li>${track.name} - ${track.artists[0].name}</li>`;
            });
        }

        function logout() {
            localStorage.removeItem('spotify_token');
            window.location.href = 'index.html';
        }

        // Проверяем токен при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('spotify_token');
            if (savedToken) {
                loadUserData();
            }
        });
    </script>
</body>
</html>
